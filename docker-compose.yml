services:
  daily-work-api:
    build: .
    container_name: daily-work-api
    env_file:
      - path: .env
        required: false
    ports:
      - "${PORT:-8000}:8000"
    restart: unless-stopped
    networks:
      - default
      - let-s-fuck

networks:
  let-s-fuck:
    external: true
    name: let-s-fuck_default
